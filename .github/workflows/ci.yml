name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: npm run check

      - name: Generate icons
        run: npm run icons

      - name: Build packages
        run: npm run build

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: shortless-packages
          path: dist/*.zip
          retention-days: 14
